apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-directory
  namespace: employee-directory
  labels:
    app: employee-directory
spec:
  replicas: 3
  selector:
    matchLabels:
      app: employee-directory
  template:
    metadata:
      labels:
        app: employee-directory
    spec:
      containers:
      - name: employee-directory
        image: employee-directory:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/employees
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/employees
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5