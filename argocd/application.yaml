apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-directory
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/employee-directory.git
    targetRevision: HEAD
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: employee-directory
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true